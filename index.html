<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PL-CM-1.5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1d23;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d23;
      color: #fff;
      padding: 32px 48px 28px;
    }
    .header-inner {
      max-width: 900px;
      margin: auto;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #7b8fa6;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.3px;
      margin-bottom: 16px;
    }

    .sprint-scope {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .sprint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      color: #c8d4e0;
    }
    .sprint-item .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      background: rgba(255,255,255,.12);
      border-radius: 4px;
      padding: 2px 6px;
      color: #7b8fa6;
    }

    .quick-links {
      display: flex;
      gap: 10px;
    }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #7b8fa6;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      transition: color .15s, border-color .15s;
    }
    .quick-link:hover { color: #c8d4e0; border-color: rgba(255,255,255,.2); }

    main {
      flex: 1;
      padding: 40px 48px;
      max-width: 996px;
      margin: auto;
      width: 100%;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #8e9aab;
      padding-bottom: 4px;
      border-bottom: 1px solid #dde2ea;
      margin-bottom: 16px;
    }

    .card-grid { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #dde2ea;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .card--standard  .card-icon { background: #ecfdf5; color: #10b981; }
    .card--mg        .card-icon { background: #fffbeb; color: #f59e0b; }
    .card--feedback  .card-icon { background: #f0f0ff; color: #6366f1; }

    .card h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .card-arrow { font-size: 12px; color: #9aa3b0; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #9aa3b0;
      padding: 20px 48px;
      border-top: 1px solid #dde2ea;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="eyebrow">Customer Management</div>
      <h1>PL-CM-1.5</h1>
      <div class="sprint-scope">
        <div class="sprint-item">General Contact</div>
        <div class="sprint-item">MM Logins</div>
        <div class="sprint-item">Feedback Flyout</div>
        <div class="sprint-item">Contact Import / Export</div>
      </div>
      <div class="quick-links">
        <a class="quick-link" href="https://hpembridge.github.io/Sprint-Tracker/" target="_blank">
          <i class="fa-solid fa-chart-gantt"></i> Sprint Tracker
        </a>
        <a class="quick-link" href="https://github.com/hpembridge/PL-CM-1.5" target="_blank">
          <i class="fa-brands fa-github"></i> Project Files
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="section-label">Prototypes</div>
    <div class="card-grid">

      <a class="card card--standard" href="customer-detail-page.html">
        <div class="card-icon"><i class="fa-solid fa-user"></i></div>
        <h2>Standard Customer</h2>
        <i class="fa-solid fa-arrow-right card-arrow"></i>
      </a>

      <a class="card card--mg" href="customer-detail-page-mg-group.html">
        <div class="card-icon"><i class="fa-solid fa-building"></i></div>
        <h2>Management Group</h2>
        <i class="fa-solid fa-arrow-right card-arrow"></i>
      </a>

      <a class="card card--feedback" href="feedback-flyout.html">
        <div class="card-icon"><i class="fa-solid fa-comment-dots"></i></div>
        <h2>Feedback Flyout</h2>
        <i class="fa-solid fa-arrow-right card-arrow"></i>
      </a>

    </div>
  </main>

  <footer>PL-CM-1.5 &nbsp;·&nbsp; Cleveland Menu Co.</footer>

</body>
</html>
