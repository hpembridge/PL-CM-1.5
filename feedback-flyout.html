<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!--
  Feedback flyout widget
  Drop this anywhere in your page <body>.
  For real pages: position:fixed is used so the button + panel float over all content.
  Swap the Smartsheet src URL if the form ID ever changes.
-->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="shared/css/design-tokens.css" />

<style>
  :root{
    --spacing-val: 32;
    --height-val: 48;
    --spacing: calc(var(--spacing-val)*1px);
    --height: calc(var(--height-val)*1px);
    --gap: calc(var(--spacing-val)*1px);
  }
  #fbk-btn {
    position: fixed;
    top: var(--spacing);
    right: var(--spacing);
    width: var(--height);
    height: var(--height);
    border-radius: 30%;
    background: var(--status-warning-bg);
    border: solid 1px var(--status-warning-border);
    color: var(--status-warning-border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    transition: transform 0.2s ease, background 0.2s ease;
    outline: none;
  }

  #fbk-btn:hover {
    transform: scale(1.07);
  }

  #fbk-btn i {
    font-size: 24px;
  }


  #fbk-overlay {
    position: fixed;
    inset: 0;
    z-index: 8998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }

  #fbk-overlay.active {
    pointer-events: all;
  }

  #fbk-panel {
    position: fixed;
    top: calc((var(--spacing-val) + var(--height-val)) * 1px + var(--gap));
    right: var(--spacing);
    width: var(--container-aside);
    background: #fff;
    z-index: 8999;
    border-radius: 8px;
    box-shadow: 16px 16px 32px color-mix(in srgb, var(--status-warning-border), transparent 80%);
    transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px) scale(0.97);
    pointer-events: none;
    border: solid 1px var(--status-warning-border);
    overflow: hidden;
  }

  #fbk-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .fbk-close {
    background: none;
    border: none;
    color: #633806;
    font-size: 15px;
    cursor: pointer;
    padding: 5px 7px;
    border-radius: 6px;
    transition: background 0.15s;
    line-height: 1;
  }

  .fbk-body {
    overflow-y: auto;
  }

  .fbk-body iframe {
    width: 100%;
    height: calc(100vh - (var(--spacing-val) + var(--height-val)) * 1px - var(--gap) - var(--spacing));
    border: none;
    display: block;
  }

</style>

<!-- Trigger button -->
<button id="fbk-btn" title="Share feedback" aria-label="Open feedback form">
  <i class="fa-solid fa-comment-dots" aria-hidden="true"></i>
</button>

<!-- Dim overlay (click to close) -->
<div id="fbk-overlay"></div>

<!-- Flyout panel -->
<div id="fbk-panel" role="dialog" aria-modal="true" aria-label="Feedback form">
  <div class="fbk-body">
    <iframe
      src="https://app.smartsheet.com/b/form/019ee10f622d716491684bd499b1a0f9"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
      title="Feedback form"
      loading="lazy"
    ></iframe>
  </div>
</div>

<script>
  (function () {
    const btn     = document.getElementById('fbk-btn');
    const panel   = document.getElementById('fbk-panel');
    const overlay = document.getElementById('fbk-overlay');
    const close   = document.getElementById('fbk-close');

    const icon = btn.querySelector('i');

    function open() {
      panel.classList.add('open');
      overlay.classList.add('active');
      icon.className = 'fa-solid fa-xmark';
    }

    function shut() {
      panel.classList.remove('open');
      overlay.classList.remove('active');
      icon.className = 'fa-solid fa-comment-dots';
    }

    function toggle() { panel.classList.contains('open') ? shut() : open(); }

    btn.addEventListener('click', toggle);
    overlay.addEventListener('click', shut);
    close.addEventListener('click', shut);
  })();
</script>

</body>
</html>
